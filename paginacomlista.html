    <body>
        <section>The ingredients:
            <ul>
                <li>100 g.flour</li>
                <li>10 g.sugar</li>
                <li>1 cup water</li>
                <li>2 eggs</li>
                <li>salt,pepper</li>
            </ul>
            The procedure:
            <ol>
                <li>Mix dry ingredients thoroughly.</li>
                <li>Pour in wet ingredients.</li>
                <li>Mix for 10 minutes.</li>
                <li>bake for one hour at 300 degrees.</li>
            </ol>
            Notes:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The recipe may be improved by adding raisins.
        </section>
    </body>
