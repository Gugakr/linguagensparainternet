    <body>
        <section>
            <dt>The ingredients
                <dd>• 100 g.flour</dd>
                <dd>• 10 g.sugar</dd>
                <dd>• 1 cup water</dd>
                <dd>• 2 eggs</dd>
                <dd>• salt,pepper</dd>
            </dt>
            <dt>The procedure
                <dd>1. Mix dry ingredients thoroughly.</dd>
                <dd>2. Pour in wet ingredients.</dd>
                <dd>3. Mix for 10 minutes.</dd>
                <dd>4. bake for one hour at 300 degrees.</dd>
            </dt>
            Notes:<br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;The recipe may be improved by adding raisins.
        </section>
